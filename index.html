<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- No-flash theme: apply the stored (or system) theme before first
         paint. Keep the storage key in sync with src/context/ThemeContext.jsx.
         CSP NOTE: this inline script is allowlisted by a sha256 hash in
         vercel.json's Content-Security-Policy. If you change ANY character
         of it (including whitespace), recompute the hash of the exact text
         between the opening and closing script tags (sha256, base64) and
         update the 'sha256-...' entry in vercel.json, or the theme snippet
         will be silently blocked in production. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("bethere-theme");
          var isDark =
            stored === "dark" ||
            ((!stored || stored === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!-- SEO / Open Graph values below mirror src/lib/site.js, which is the
         source of truth. This file is static HTML, so the same strings are
         hardcoded here; keep them in sync when site.js changes. -->

    <!-- Primary meta -->
    <title>BeThere - Attendance you can't fake</title>
    <meta
      name="description"
      content="BeThere verifies live presence for events: scan the venue's rotating on-site code, then a real-time face check confirms it's you, all verified on the server."
    />
    <meta name="author" content="Nurudeen Abdul-Majeed" />
    <meta name="theme-color" content="#f1f1f1" />
    <link rel="canonical" href="https://bethere.manuru.dev/" />

    <!-- Favicon: scalable SVG (universally supported by current browsers). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts: Outfit (display), Instrument Sans (body), Space Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Outfit:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bethere.manuru.dev/" />
    <meta property="og:site_name" content="BeThere" />
    <meta property="og:title" content="BeThere - Attendance you can't fake" />
    <meta
      property="og:description"
      content="Scan the venue's live rotating code, then a real-time face check confirms it's you. Attendance verified on the server."
    />
    <!-- Static OG image: a 1200x630 screenshot of the landing hero
         (public/og.png), served as a plain static asset. -->
    <meta property="og:image" content="https://bethere.manuru.dev/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BeThere - Verified live presence" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://bethere.manuru.dev/" />
    <meta name="twitter:title" content="BeThere - Attendance you can't fake" />
    <meta
      name="twitter:description"
      content="Scan the venue's live rotating code, then a real-time face check confirms it's you. Attendance verified on the server."
    />
    <meta name="twitter:image" content="https://bethere.manuru.dev/og.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "BeThere",
        "url": "https://bethere.manuru.dev/",
        "description": "BeThere verifies live presence for events: scan the venue's rotating on-site code, then a real-time face check confirms it's you, all verified on the server.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "author": {
          "@type": "Person",
          "name": "Nurudeen Abdul-Majeed",
          "url": "https://manuru.dev"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
